name: Release Build

on:
    push:
        tags:
            - 'v*'

jobs:
    create-release:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        outputs:
            release_id: ${{ steps.create-release.outputs.id }}
        steps:
            - uses: actions/checkout@v4

            - name: Create Release
              id: create-release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  prerelease: false
                  generate_release_notes: true

    build-tauri:
        name: 'Build on ${{ matrix.platform }}'
        needs: create-release
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-latest
                      args: ''
                    - platform: ubuntu-22.04
                      args: ''
                      # Linux builds produce .deb and .AppImage by default if configured in tauri.conf.json
                    - platform: windows-latest
                      args: ''
                      # Windows builds produce .msi or setup.exe

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v4

            - name: Install Dependencies (Ubuntu)
              if: matrix.platform == 'ubuntu-22.04'
              # Install dependencies for Tauri v2 on Linux
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev rpm

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Create Environment File
              env:
                  ENV_LOCAL: ${{ secrets.ENV_LOCAL }}
              # We need .env.local for the build command to succeed, even if empty or dummy.
              # Ideally, you should add a repository secret named ENV_LOCAL with the contents of your .env.local
              run: |
                  if [ -n "$ENV_LOCAL" ]; then
                    printf '%s' "$ENV_LOCAL" > .env.local
                  else
                    echo "Creating dummy .env.local for build (Warning: App may not function correctly without real keys)"
                    echo "NEXT_PUBLIC_APP_URL=https://skriuw.vercel.app" > .env.local
                    echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_dummy" >> .env.local
                    echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/db" >> .env.local
                  fi
              shell: bash

            - name: Build Next.js
              env:
                  # Ensure this env var is set so Next.js produces static export
                  TAURI_BUILD: 'true'
              run: |
                  cd apps/web
                  bun run build

            - name: Build Tauri and Upload Assets
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  releaseId: ${{ needs.create-release.outputs.release_id }}
                  projectPath: apps/web/src-tauri
                  args: ${{ matrix.args }}
