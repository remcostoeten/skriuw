version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quantum-work-postgres-dev
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum123
      POSTGRES_DB: quantum_work
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:

