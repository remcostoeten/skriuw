<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skriuw — API Audit & Implementation Plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --surface3: #22222e;
            --border: #2a2a3a;
            --text: #e4e4ef;
            --text2: #9494a8;
            --accent: #6366f1;
            --accent2: #818cf8;
            --red: #ef4444;
            --orange: #f59e0b;
            --yellow: #eab308;
            --green: #22c55e;
            --blue: #3b82f6;
            --cyan: #06b6d4
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 80px
        }

        header {
            text-align: center;
            padding: 48px 0 40px;
            position: relative
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(99, 102, 241, .12), transparent 70%);
            pointer-events: none
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e4e4ef, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -.02em
        }

        .subtitle {
            color: var(--text2);
            font-size: .95rem;
            max-width: 600px;
            margin: 0 auto
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 32px 0
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: border-color .2s
        }

        .stat:hover {
            border-color: var(--accent)
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .stat-label {
            font-size: .75rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-top: 2px
        }

        .progress-bar {
            background: var(--surface2);
            border-radius: 99px;
            height: 8px;
            margin: 20px 0 8px;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--cyan));
            transition: width .5s ease
        }

        .progress-text {
            text-align: right;
            font-size: .8rem;
            color: var(--text2)
        }

        nav {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 28px 0 24px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg);
            padding: 8px 0
        }

        nav button {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-size: .8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap
        }

        nav button:hover,
        nav button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .phase {
            display: none;
            animation: fadeIn .3s ease
        }

        .phase.visible {
            display: block
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .phase-header {
            margin-bottom: 24px
        }

        .phase-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .phase-desc {
            color: var(--text2);
            font-size: .88rem
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .04em
        }

        .badge-critical {
            background: rgba(239, 68, 68, .15);
            color: var(--red)
        }

        .badge-high {
            background: rgba(245, 158, 11, .15);
            color: var(--orange)
        }

        .badge-medium {
            background: rgba(234, 179, 8, .15);
            color: var(--yellow)
        }

        .badge-info {
            background: rgba(99, 102, 241, .15);
            color: var(--accent2)
        }

        .task-group {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color .2s
        }

        .task-group:hover {
            border-color: color-mix(in srgb, var(--border) 50%, var(--accent))
        }

        .tg-header {
            padding: 16px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none
        }

        .tg-header:hover {
            background: var(--surface2)
        }

        .tg-chevron {
            transition: transform .2s;
            color: var(--text2);
            flex-shrink: 0;
            font-size: .8rem
        }

        .tg-header.open .tg-chevron {
            transform: rotate(90deg)
        }

        .tg-title {
            flex: 1;
            font-weight: 600;
            font-size: .95rem
        }

        .tg-count {
            font-size: .75rem;
            color: var(--text2);
            background: var(--surface3);
            padding: 2px 8px;
            border-radius: 99px
        }

        .tg-body {
            display: none;
            padding: 0 18px 14px
        }

        .tg-header.open+.tg-body {
            display: block
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border)
        }

        .task:last-child {
            border-bottom: none
        }

        .task input[type=checkbox] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            position: relative;
            transition: all .2s
        }

        .task input[type=checkbox]:checked {
            background: var(--accent);
            border-color: var(--accent)
        }

        .task input[type=checkbox]:checked::after {
            content: '✓';
            position: absolute;
            top: -1px;
            left: 2px;
            font-size: 12px;
            color: #fff;
            font-weight: 700
        }

        .task-content {
            flex: 1;
            min-width: 0
        }

        .task-title {
            font-size: .88rem;
            font-weight: 500;
            transition: opacity .2s
        }

        .task.done .task-title {
            opacity: .45;
            text-decoration: line-through
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px
        }

        .tag {
            font-size: .68rem;
            padding: 1px 7px;
            border-radius: 4px;
            font-weight: 500
        }

        .tag-branch {
            background: rgba(99, 102, 241, .12);
            color: var(--accent2)
        }

        .tag-test {
            background: rgba(34, 197, 94, .12);
            color: var(--green)
        }

        .tag-file {
            background: rgba(6, 182, 212, .12);
            color: var(--cyan)
        }

        .tag-security {
            background: rgba(239, 68, 68, .12);
            color: var(--red)
        }

        .tag-perf {
            background: rgba(245, 158, 11, .12);
            color: var(--orange)
        }

        .tag-breaking {
            background: rgba(239, 68, 68, .2);
            color: var(--red);
            font-weight: 700
        }

        .note {
            font-size: .78rem;
            color: var(--text2);
            margin-top: 4px;
            padding: 6px 10px;
            background: var(--surface2);
            border-radius: 6px;
            border-left: 2px solid var(--accent)
        }

        .search {
            width: 100%;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            font-size: .88rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color .2s
        }

        .search:focus {
            border-color: var(--accent)
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: .75rem;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--surface2);
            color: var(--text);
            border-color: var(--accent)
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: .82rem;
            color: var(--accent2);
            opacity: 0;
            transform: translateY(10px);
            transition: all .3s;
            pointer-events: none;
            z-index: 999
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        @media(max-width:640px) {
            .stats {
                grid-template-columns: repeat(2, 1fr)
            }

            h1 {
                font-size: 1.6rem
            }

            nav {
                gap: 4px
            }

            nav button {
                padding: 6px 10px;
                font-size: .72rem
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <h1>Skriuw API Audit</h1>
            <p class="subtitle">Implementation plan & task tracker — each task persists in IndexedDB so progress is
                never lost</p>
        </header>
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="s-total">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-done">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-critical">0</div>
                <div class="stat-label">Critical Open</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="s-pct">0%</div>
                <div class="stat-label">Progress</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="pbar"></div>
        </div>
        <p class="progress-text" id="ptxt"></p>
        <input class="search" id="search" placeholder="Search tasks..." autocomplete="off">
        <div class="filter-row">
            <button class="filter-btn active" data-f="all">All</button>
            <button class="filter-btn" data-f="open">Open</button>
            <button class="filter-btn" data-f="done">Done</button>
            <button class="filter-btn" data-f="security">🔒 Security</button>
            <button class="filter-btn" data-f="perf">⚡ Perf</button>
            <button class="filter-btn" data-f="test">🧪 Test</button>
        </div>
        <nav id="nav"></nav>
        <div id="phases"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const PHASES = [
            {
                id: 'p0', title: 'Phase 0 — Strategy & Architecture', desc: 'Define the core platform logic and storage strategy. This is the blueprint for all subsequent work.', badge: 'critical', groups: [
                    {
                        title: 'Platform Detection Logic', tasks: [
                            { id: 'p0-1', done: true, t: 'Create packages/core/shared/helpers/determine-platform.ts', tags: ['file:packages/core/shared/helpers/determine-platform.ts'], note: 'Must export helper function: isWeb(), isTauri(), isExpo(). Logic: if (window.__TAURI__) -> desktop; if (globalThis.expo) -> mobile; else -> web.' },
                            { id: 'p0-2', done: true, t: 'Define Platform Constant export', tags: ['file:packages/core/shared/platform.ts'], note: 'export const Platform = { isWeb: ..., isTauri: ..., isExpo: ..., isServer: ... }' }
                        ]
                    },
                    {
                        title: 'Storage Strategy Definition', tasks: [
                            { id: 'p0-3', done: true, t: 'Document Storage Strategy in AGENTS.md or Core Docs', tags: ['file:AGENTS.md'], note: 'Web: Server Actions -> Cloud PG. Desktop (Privacy): Local SQLite. Desktop (Sync): Local SQLite + Background Sync. Mobile: Local SQLite + Background Sync.' },
                            { id: 'p0-4', done: true, t: 'Define Sync Token / API Key logic for tying Desktop/Mobile to Web Account', tags: ['file:packages/core/src/auth/sync.ts'] }
                        ]
                    }
                ]
            },
            {
                id: 'p1', title: 'Phase 1 — Critical Security Fixes', desc: 'Fix authentication gaps and security vulnerabilities. Must be done before any other work.', badge: 'critical', groups: [
                    {
                        title: '🔴 Fix Import Route Authentication (CRITICAL-002)', tasks: [
                            { id: 'p1-1', done: true, t: 'Add requireAuth() or requireMutation() to POST handler in app/api/import/route.ts', tags: ['file:app/api/import/route.ts', 'security'], note: 'This route currently has ZERO auth — anyone can insert data. Highest priority fix.' },
                            { id: 'p1-2', done: true, t: 'Extract userId from authenticated session and attach to all imported notes/folders', tags: ['security', 'file:app/api/import/route.ts'] },
                            { id: 'p1-3', done: true, t: 'Add request body size validation (max 5MB or configurable limit)', tags: ['security'] },
                            { id: 'p1-4', done: true, t: 'Add Zod schema validation for the import payload structure', tags: ['file:app/api/import/route.ts'] },
                            { id: 'p1-5', done: true, t: 'Convert sequential item insertion to batch insert (db.insert().values([...]))', tags: ['perf', 'file:app/api/import/route.ts'] },
                            { id: 'p1-6', done: true, t: 'Write integration test: unauthenticated POST returns 401', tags: ['test'] },
                            { id: 'p1-7', done: true, t: 'Write integration test: authenticated POST with valid payload succeeds and items have correct userId', tags: ['test'] },
                            { id: 'p1-8', done: true, t: 'Write integration test: oversized payload returns 413', tags: ['test'] },
                        ]
                    },
                    {
                        title: '🔴 Fix Global Mutable CRUD Context (CRITICAL-003)', tasks: [
                            { id: 'p1-9', done: true, t: 'Audit all server-side usages of setUserContext() / getUserContext() from @skriuw/crud', tags: ['security', 'file:packages/crud/src/context.ts'], note: 'Completed 2026-02-14: no direct server-side callsites found outside package exports' },
                            { id: 'p1-10', done: true, t: 'If CRUD is used server-side: replace module-level let with AsyncLocalStorage', tags: ['security'], note: 'Completed 2026-02-14 as N/A after audit: no server-side callsites; using client-only guard path instead.' },
                            { id: 'p1-11', done: true, t: 'If CRUD is client-only: add a runtime guard that throws when called in a server environment', tags: ['security'], note: 'Completed 2026-02-14 in packages/crud/src/context.ts' },
                            { id: 'p1-12', done: true, t: 'Write test: concurrent setUserContext calls do not leak between async contexts', tags: ['test'], note: 'Completed 2026-02-14 in packages/crud/src/context.test.ts (concurrent server calls rejected by guard)' },
                        ]
                    },
                    {
                        title: '🔴 Normalize Auth in AI Routes (AUTH-001)', tasks: [
                            { id: 'p1-13', done: true, t: 'Replace direct auth.api.getSession() in app/api/ai/prompt/route.ts with requireAuth()', tags: ['security', 'file:app/api/ai/prompt/route.ts'], note: 'Completed 2026-02-14 (worker + main review)' },
                            { id: 'p1-14', done: true, t: 'Replace direct auth.api.getSession() in app/api/ai/config/route.ts with requireAuth()', tags: ['security', 'file:app/api/ai/config/route.ts'], note: 'Completed 2026-02-14 (worker + main review)' },
                            { id: 'p1-15', done: true, t: 'Replace direct auth.api.getSession() in app/api/ai/usage/route.ts with requireAuth()', tags: ['security', 'file:app/api/ai/usage/route.ts'], note: 'Completed 2026-02-14 (worker + main review)' },
                            { id: 'p1-16', t: 'Verify all 3 AI routes now use the shared auth pattern - run existing tests', tags: ['test'], note: 'Blocked 2026-02-14 in local env: app test setup cannot resolve jsdom path in workspace layout' },
                        ]
                    },
                    {
                        title: 'Normalize Guest User ID (AUTH-003)', tasks: [
                            { id: 'p1-17', done: true, t: 'Create GUEST_USER_ID constant in @skriuw/shared or lib/constants.ts', tags: ['file:packages/shared'], note: 'Completed 2026-02-14 by main agent' },
                            { id: 'p1-18', done: true, t: 'Find and replace all "guest" and "guest-user" string literals across feature hooks with the constant', tags: [], note: 'Completed 2026-02-14 by main agent' },
                            { id: 'p1-19', done: true, t: 'Update api-auth.ts GUEST_USER_ID to use the shared constant', tags: ['file:lib/api-auth.ts'], note: 'Completed 2026-02-14 by main agent' },
                            { id: 'p1-20', done: true, t: 'Grep for remaining hardcoded guest strings and fix', tags: ['test'], note: 'Completed 2026-02-14 by main agent (residual literal only in legacy/test compatibility paths)' },
                        ]
                    },
                    {
                        title: 'Branch & Deploy', tasks: [
                            { id: 'p1-21', t: 'Create branch: fix/critical-security-audit', tags: ['branch:fix/critical-security-audit'] },
                            { id: 'p1-22', t: 'Run full test suite, verify no regressions', tags: ['test'] },
                            { id: 'p1-23', t: 'PR review — security-focused review required', tags: ['security'] },
                            { id: 'p1-24', t: 'Merge to daddy and deploy immediately', tags: ['branch:daddy', 'breaking'] },
                        ]
                    }
                ]
            },
            {
                id: 'p2', title: 'Phase 2 — Shared Core Package', desc: 'Create @skriuw/core with Zod schemas, shared types, and business rules that all platforms will use.', badge: 'info', groups: [
                    {
                        title: 'Create @skriuw/core Package', tasks: [
                            { id: 'p2-1', t: 'Create packages/core/ directory with package.json, tsconfig.json, tsup.config.ts', tags: ['file:packages/core/package.json', 'branch:feat/core-package'] },
                            { id: 'p2-2', t: 'Create packages/core/src/schemas/notes.ts — Zod schemas for CreateNote, UpdateNote, NoteResponse', tags: ['file:packages/core/src/schemas/notes.ts'] },
                            { id: 'p2-3', t: 'Create packages/core/src/schemas/settings.ts — Zod schema for settings upsert', tags: ['file:packages/core/src/schemas/settings.ts'] },
                            { id: 'p2-4', t: 'Create packages/core/src/schemas/tasks.ts — Zod schemas for Task CRUD + sync payload', tags: ['file:packages/core/src/schemas/tasks.ts'] },
                            { id: 'p2-5', t: 'Create packages/core/src/schemas/shortcuts.ts — schema for shortcut create/update', tags: ['file:packages/core/src/schemas/shortcuts.ts'] },
                            { id: 'p2-6', t: 'Create packages/core/src/schemas/ai.ts — schemas for AI config, prompt, usage', tags: ['file:packages/core/src/schemas/ai.ts'] },
                            { id: 'p2-7', t: 'Create packages/core/src/schemas/import.ts — schema for import payload', tags: ['file:packages/core/src/schemas/import.ts'] },
                            { id: 'p2-8', t: 'Create packages/core/src/types/ — shared TypeScript interfaces (Note, Task, etc.)', tags: ['file:packages/core/src/types/'] },
                            { id: 'p2-9', t: 'Create packages/core/src/rules/ — business rules (e.g. MAX_NOTE_SIZE, RATE_LIMITS)', tags: ['file:packages/core/src/rules/'] },
                            { id: 'p2-10', t: 'Add @skriuw/core to apps/web/package.json dependencies', tags: [] },
                            { id: 'p2-11', t: 'Write unit tests for all Zod schemas (valid + invalid payloads)', tags: ['test'] },
                        ]
                    },
                    {
                        title: 'Integrate Validation into API Routes', tasks: [
                            { id: 'p2-12', t: 'Add Zod validation to POST /api/notes using NoteCreateSchema', tags: ['file:app/api/notes/route.ts'] },
                            { id: 'p2-13', t: 'Add Zod validation to PUT /api/notes using NoteUpdateSchema', tags: ['file:app/api/notes/route.ts'] },
                            { id: 'p2-14', t: 'Add Zod validation to POST /api/settings', tags: ['file:app/api/settings/route.ts'] },
                            { id: 'p2-15', t: 'Add Zod validation to all task routes', tags: ['file:app/api/tasks/'] },
                            { id: 'p2-16', t: 'Add Zod validation to AI config POST/PATCH', tags: ['file:app/api/ai/config/route.ts'] },
                            { id: 'p2-17', t: 'Add Zod validation to POST /api/import (after auth fix)', tags: ['file:app/api/import/route.ts'] },
                            { id: 'p2-18', t: 'Write integration tests: invalid payloads return 400 with Zod error messages', tags: ['test'] },
                        ]
                    },
                    {
                        title: 'Branch & Deploy', tasks: [
                            { id: 'p2-19', t: 'Create branch: feat/core-package', tags: ['branch:feat/core-package'] },
                            { id: 'p2-20', t: 'Run full test suite + build check', tags: ['test'] },
                            { id: 'p2-21', t: 'Merge to daddy', tags: ['branch:daddy'] },
                        ]
                    }
                ]
            },
            {
                id: 'p3', title: 'Phase 3 — Server Actions Migration', desc: 'Add server actions as the primary data path for the web client. Eliminate HTTP overhead. Keep API routes for native clients.', badge: 'high', groups: [
                    {
                        title: 'Notes Domain — Server Actions', tasks: [
                            { id: 'p3-1', t: 'Create features/notes/server/queries.ts with typed Drizzle queries (getNotes, getNoteById, getNoteTree)', tags: ['file:features/notes/server/queries.ts', 'branch:feat/server-actions-notes'] },
                            { id: 'p3-2', t: 'Implement lazy tree loading in getNoteTree — only return root items, load children on demand', tags: ['perf'], note: 'This fixes CRITICAL-004 (full tree download). Return only top-level items with a childCount field. Add a getChildren(parentId) query.' },
                            { id: 'p3-3', t: 'Create features/notes/actions/get-notes.ts — "use server" + auth wrapper around queries', tags: ['file:features/notes/actions/get-notes.ts'] },
                            { id: 'p3-4', t: 'Create features/notes/actions/create-note.ts — server action with Zod validation', tags: ['file:features/notes/actions/create-note.ts'] },
                            { id: 'p3-5', t: 'Create features/notes/actions/update-note.ts — server action with Zod validation', tags: ['file:features/notes/actions/update-note.ts'] },

        // IndexedDB
        const DB_NAME = 'skriuw-audit', DB_STORE = 'tasks', DB_VER = 1;
        function openDB() { return new Promise((res, rej) => { const r = indexedDB.open(DB_NAME, DB_VER); r.onupgradeneeded = e => { e.target.result.createObjectStore(DB_STORE) }; r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e) }) }
        async function loadState() { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(DB_STORE, 'readonly'), s = tx.objectStore(DB_STORE), r = s.get('checked'); r.onsuccess = () => res(r.result || {}); r.onerror = () => res({}) }) }
        async function saveState(state) { const db = await openDB(); const tx = db.transaction(DB_STORE, 'readwrite'); tx.objectStore(DB_STORE).put(state, 'checked') }
        let checked = {};
        function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000) }
        function updateStats() {
            const all = document.querySelectorAll('.task'); const done = document.querySelectorAll('.task.done');
            const critOpen = document.querySelectorAll('.task:not(.done) [data-tag="security"]');
            document.getElementById('s-total').textContent = all.length;
            document.getElementById('s-done').textContent = done.length;
            document.getElementById('s-critical').textContent = critOpen.length;
            const pct = all.length ? Math.round(done.length / all.length * 100) : 0;
            document.getElementById('s-pct').textContent = pct + '%';
            document.getElementById('pbar').style.width = pct + '%';
            document.getElementById('ptxt').textContent = done.length + ' of ' + all.length + ' tasks complete';
            // Update group counts
            document.querySelectorAll('.task-group').forEach(g => {
                const gt = g.querySelectorAll('.task').length, gd = g.querySelectorAll('.task.done').length;
                const c = g.querySelector('.tg-count'); if (c) c.textContent = gd + '/' + gt;
            });
        }
        function render() {
            const nav = document.getElementById('nav'), container = document.getElementById('phases');
            nav.innerHTML = ''; container.innerHTML = '';
            PHASES.forEach((p, i) => {
                const btn = document.createElement('button'); btn.textContent = p.title.replace(/Phase \d+ — /, '');
                btn.className = i === 0 ? 'active' : ''; btn.onclick = () => {
                    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active')); btn.classList.add('active');
                    document.querySelectorAll('.phase').forEach(ph => ph.classList.remove('visible'));
                    document.getElementById(p.id).classList.add('visible');
                };
                nav.appendChild(btn);
                const div = document.createElement('div'); div.id = p.id; div.className = 'phase' + (i === 0 ? ' visible' : '');
                div.innerHTML = '<div class="phase-header"><div class="phase-title">' + p.title + ' <span class="badge badge-' + p.badge + '">' + p.badge + '</span></div><div class="phase-desc">' + p.desc + '</div></div>';
                p.groups.forEach(g => {
                    let html = '<div class="task-group"><div class="tg-header" onclick="this.classList.toggle(\'open\')"><span class="tg-chevron">▶</span><span class="tg-title">' + g.title + '</span><span class="tg-count">0/' + g.tasks.length + '</span></div><div class="tg-body">';
                    g.tasks.forEach(task => {
                        const isDone = !!checked[task.id] || task.done;
                        html += '<div class="task' + (isDone ? ' done' : '') + '" data-id="' + task.id + '">';
                        html += '<input type="checkbox" ' + (isDone ? 'checked' : '') + ' onchange="toggle(\'' + task.id + '\',this)">';
                        html += '<div class="task-content"><div class="task-title">' + task.t + '</div><div class="task-meta">';
                        (task.tags || []).forEach(tag => {
                            let cls = 'tag '; const tl = tag.toLowerCase();
                            if (tl.startsWith('branch:')) cls += 'tag-branch';
                            else if (tl.startsWith('file:')) cls += 'tag-file';
                            else if (tl === 'test') cls += 'tag-test';
                            else if (tl === 'security') cls += 'tag-security';
                            else if (tl === 'perf') cls += 'tag-perf';
                            else if (tl === 'breaking') cls += 'tag-breaking';
                            else cls += 'tag-file';
                            html += '<span class="' + cls + '" data-tag="' + tl + '">' + tag + '</span>';
                        });
                        html += '</div>';
                        if (task.note) html += '<div class="note">' + task.note + '</div>';
                        html += '</div></div>';
                    });
                    html += '</div></div>';
                    div.innerHTML += html;
                });
                container.appendChild(div);
            });
            updateStats();
        }
        async function toggle(id, el) {
            checked[id] = el.checked;
            const task = el.closest('.task');
            if (el.checked) { task.classList.add('done'); toast('✓ Task completed') }
            else { task.classList.remove('done'); toast('Task reopened') }
            await saveState(checked); updateStats();
        }
        // Search
        document.getElementById('search').addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            document.querySelectorAll('.task').forEach(t => {
                t.style.display = t.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        });
        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const f = btn.dataset.f;
                document.querySelectorAll('.task').forEach(t => {
                    if (f === 'all') t.style.display = 'flex';
                    else if (f === 'open') t.style.display = t.classList.contains('done') ? 'none' : 'flex';
                    else if (f === 'done') t.style.display = t.classList.contains('done') ? 'flex' : 'none';
                    else t.style.display = t.querySelector('[data-tag="' + f + '"]') ? 'flex' : 'none';
                });
            });
        });
        // Init
        (async () => { checked = await loadState(); render() })();
    </script>
