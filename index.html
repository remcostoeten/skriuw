<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>quantum work</title>
	<script>
		(function() {
			try {
				const stored = localStorage.getItem('app:settings');
				if (stored) {
					const parsed = JSON.parse(stored);
					if (Array.isArray(parsed)) {
						const settingsEntity = parsed.find(item => item && item.id === 'app-settings');
						if (settingsEntity && settingsEntity.settings && settingsEntity.settings.theme) {
							const theme = settingsEntity.settings.theme;
							const root = document.documentElement;
							
							if (theme === 'system') {
								const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
								root.classList.add(systemTheme);
							} else {
								root.classList.add(theme);
							}
							return;
						}
					}
				}
			} catch (e) {
				// Silently fail and use default
			}
			// Default to dark theme if no settings found
			document.documentElement.classList.add('dark');
		})();
	</script>
</head>

<body>
	<div id="root"></div>

	<script type="module" src="/src/App.tsx"></script>
</body>

</html>
